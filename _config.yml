# Site settings
title: E-Commerce Operator Roadmap
description: >-
  🗺️ 电商操盘手全栈技能成长路线图 — 从新手到专家的完整学习体系。
  系统化的技能树、分级定位、丰富的学习资源。

baseurl: "/CBEC-AI-Hub"
url: "https://kangise.github.io"

# Build settings
markdown: kramdown
highlighter: rouge
theme: minima

# Minima theme settings
minima:
  skin: dark
  social_links:
    github: kangise

# Collections
collections:
  roadmap:
    output: true
    permalink: /roadmap/:name/

# Navigation
header_pages:
  - index.md
  - roadmap/00-self-assessment.md
  - about.md
  - CONTRIBUTING.md

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Exclude from processing
exclude:
  - .github/
  - node_modules/
  - vendor/
  - .bundle/
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - README.md
  - assets/
  - datasets/
  - examples/
  - scripts/
  - tests/
  - tools/
  - docs/
  - PROJECT_UPDATE_SUMMARY.md
  - requirements.txt
