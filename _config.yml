# GitHub Repository Topics (set manually in repo Settings → About):
#   ai, cross-border-ecommerce, prompt-engineering, cbec, amazon,
#   awesome-list, aaai, ecommerce, chatgpt, prompt-templates

# Site settings
title: "CBEC-AI-Hub: AI × Cross-Border E-Commerce Knowledge Hub"
description: >-
  AI × 跨境电商实战知识库 — 可直接使用的 Prompt 模板、Colab Notebook、实战案例。
  The definitive AI guide for cross-border e-commerce — ready-to-use prompts, notebooks, and case studies.
  An AAAI China Chapter Initiative.

baseurl: "/CBEC-AI-Hub"
url: "https://kangise.github.io"

# Build settings
markdown: kramdown
highlighter: rouge
theme: minima

# Minima theme settings
minima:
  skin: dark
  social_links:
    github: kangise

# Navigation
header_pages:
  - index.md
  - about.md
  - CONTRIBUTING.md

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# SEO
twitter:
  card: summary_large_image
social:
  name: CBEC-AI-Hub
  links:
    - https://github.com/kangise/CBEC-AI-Hub

# Exclude from processing
exclude:
  - .github/
  - node_modules/
  - vendor/
  - .bundle/
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - README.md
  - README_EN.md
  - assets/
  - datasets/
  - examples/
  - scripts/
  - tests/
  - tools/
  - docs/
  - PROJECT_UPDATE_SUMMARY.md
  - CHANGELOG.md
  - CODEOWNERS
  - EVOLUTION_LOG.md
  - requirements.txt
