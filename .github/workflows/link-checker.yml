name: Link Checker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run every Monday at 9 AM UTC
    - cron: '0 9 * * 1'

jobs:
  link-checker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check all internal links
        uses: lycheeverse/lychee-action@v1
        with:
          args: >-
            --verbose --no-progress --exclude-mail
            --include-fragments
            README.md
            README_EN.md
            paths/**/*.md
            prompts/**/*.md
            notebooks/**/*.md
            docs/**/*.md
            roadmap/**/*.md
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Broken links detected',
              body: 'The link checker found broken links. Please check the workflow logs for details.',
              labels: ['bug', 'broken-link']
            })
