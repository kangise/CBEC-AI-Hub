<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1E3A5F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E293B;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <g opacity="0.06">
    <line x1="0" y1="80" x2="1280" y2="80" stroke="white" stroke-width="1"/>
    <line x1="0" y1="160" x2="1280" y2="160" stroke="white" stroke-width="1"/>
    <line x1="0" y1="240" x2="1280" y2="240" stroke="white" stroke-width="1"/>
    <line x1="0" y1="320" x2="1280" y2="320" stroke="white" stroke-width="1"/>
    <line x1="0" y1="400" x2="1280" y2="400" stroke="white" stroke-width="1"/>
    <line x1="0" y1="480" x2="1280" y2="480" stroke="white" stroke-width="1"/>
    <line x1="0" y1="560" x2="1280" y2="560" stroke="white" stroke-width="1"/>
    <line x1="160" y1="0" x2="160" y2="640" stroke="white" stroke-width="1"/>
    <line x1="320" y1="0" x2="320" y2="640" stroke="white" stroke-width="1"/>
    <line x1="480" y1="0" x2="480" y2="640" stroke="white" stroke-width="1"/>
    <line x1="640" y1="0" x2="640" y2="640" stroke="white" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="640" stroke="white" stroke-width="1"/>
    <line x1="960" y1="0" x2="960" y2="640" stroke="white" stroke-width="1"/>
    <line x1="1120" y1="0" x2="1120" y2="640" stroke="white" stroke-width="1"/>
  </g>
  <!-- Decorative nodes (AI network) -->
  <circle cx="150" cy="150" r="6" fill="#F59E0B" opacity="0.6"/>
  <circle cx="300" cy="100" r="4" fill="#10B981" opacity="0.5"/>
  <circle cx="200" cy="250" r="5" fill="#EC4899" opacity="0.4"/>
  <circle cx="1050" cy="180" r="7" fill="#3B82F6" opacity="0.5"/>
  <circle cx="1150" cy="120" r="4" fill="#8B5CF6" opacity="0.4"/>
  <circle cx="1100" cy="280" r="5" fill="#F59E0B" opacity="0.3"/>
  <circle cx="180" cy="480" r="4" fill="#10B981" opacity="0.3"/>
  <circle cx="1080" cy="500" r="6" fill="#EC4899" opacity="0.3"/>
  <line x1="150" y1="150" x2="300" y2="100" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="150" y1="150" x2="200" y2="250" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="1050" y1="180" x2="1150" y2="120" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="1050" y1="180" x2="1100" y2="280" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <!-- Main title -->
  <text x="640" y="220" text-anchor="middle" fill="white" font-family="Inter,system-ui,sans-serif" font-size="56" font-weight="800" letter-spacing="-1">ecommerce-ai-roadmap</text>
  <!-- Subtitle -->
  <text x="640" y="290" text-anchor="middle" fill="#94A3B8" font-family="Inter,system-ui,sans-serif" font-size="24" font-weight="400">The Definitive AI Playbook for Cross-Border E-Commerce</text>
  <!-- Stats bar -->
  <g transform="translate(640, 370)" text-anchor="middle">
    <text x="-350" y="0" fill="#F59E0B" font-family="Inter,system-ui,sans-serif" font-size="36" font-weight="700">48</text>
    <text x="-350" y="30" fill="#64748B" font-family="Inter,system-ui,sans-serif" font-size="14">AI Use Cases</text>
    <text x="-120" y="0" fill="#10B981" font-family="Inter,system-ui,sans-serif" font-size="36" font-weight="700">13</text>
    <text x="-120" y="30" fill="#64748B" font-family="Inter,system-ui,sans-serif" font-size="14">Platforms</text>
    <text x="100" y="0" fill="#3B82F6" font-family="Inter,system-ui,sans-serif" font-size="36" font-weight="700">7</text>
    <text x="100" y="30" fill="#64748B" font-family="Inter,system-ui,sans-serif" font-size="14">Social Channels</text>
    <text x="320" y="0" fill="#EC4899" font-family="Inter,system-ui,sans-serif" font-size="36" font-weight="700">22</text>
    <text x="320" y="30" fill="#64748B" font-family="Inter,system-ui,sans-serif" font-size="14">Prompt Templates</text>
  </g>
  <!-- Platform icons row -->
  <text x="640" y="480" text-anchor="middle" fill="#475569" font-family="Inter,system-ui,sans-serif" font-size="16">Amazon · Shopify · TikTok Shop · Walmart · Shopee · Mercado Libre · Rakuten · eBay</text>
  <text x="640" y="510" text-anchor="middle" fill="#475569" font-family="Inter,system-ui,sans-serif" font-size="16">Instagram · YouTube · 小红书 · Pinterest · WhatsApp · Reddit</text>
  <!-- Bottom badge -->
  <text x="640" y="590" text-anchor="middle" fill="#64748B" font-family="Inter,system-ui,sans-serif" font-size="14">An AAAI China Chapter Initiative · CC0 License · Open Source</text>
</svg>
